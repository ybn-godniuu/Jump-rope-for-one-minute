<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一分钟跳绳个数情况</title>
    <!-- 引入 Chart.js 主库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 DataLabels 插件用于在折线点上显示数字 -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0b132b, #1c2541, #3a5065);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px; /* 适应9列数据 */
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(100, 180, 255, 0.7);
        }
        
        .description {
            font-size: 1.1rem;
            max-width: 800px;
            margin: 0 auto 20px;
            line-height: 1.6;
            color: #e6f2ff;
        }
        
        .input-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .table-responsive {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        /* 录入表格的专属样式 */
        .input-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 1000px; /* 确保9列显示不被过度挤压 */
        }

        .input-table th, .input-table td {
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-table th {
            background: rgba(74, 144, 226, 0.3);
            color: #cce5ff;
            font-weight: bold;
            white-space: nowrap;
        }

        .input-table td {
            background: rgba(0, 0, 0, 0.2);
        }

        .input-table td.name-cell-wen {
            font-weight: bold;
            color: #ffd166;
            background: rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        .input-table td.name-cell-li {
            font-weight: bold;
            color: #4da6ff;
            background: rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        /* 表格内的数字/文本输入框样式 */
        .cell-input {
            width: 100%;
            min-width: 60px;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        .cell-input:focus {
            background: #fff;
            box-shadow: 0 0 8px rgba(74, 144, 226, 0.8);
            border-color: #4da6ff;
        }

        /* 不可输入框的特殊样式 */
        .disabled-input {
            background: rgba(255, 255, 255, 0.2) !important;
            color: #aaa !important;
            border-color: transparent !important;
            cursor: not-allowed;
        }
        
        .action-container {
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            background: #50c878;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            background: #3dae5f;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.25);
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chart-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: #b3d9ff;
        }
        
        /* 图表自适应画布容器 */
        .canvas-wrapper {
            position: relative;
            height: 450px;
            width: 100%;
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>一分钟跳绳个数情况</h1>
            <p class="description">本系统已内置“文逸霖”的跳绳成绩。请在下方表格中输入其他同学的成绩，点击生成后即可查阅双人复式对比折线图。</p>
        </header>
        
        <!-- 成绩录入区 -->
        <section class="input-section">
            <h2 style="text-align: center; margin-bottom: 15px; font-size: 1.2rem; color: #b3d9ff;">成绩录入表</h2>
            <div class="table-responsive">
                <table class="input-table">
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>第一次</th>
                            <th>第二次</th>
                            <th>第三次</th>
                            <th>第四次</th>
                            <th>第五次</th>
                            <th>第六次</th>
                            <th>第七次</th>
                            <th>第八次</th>
                            <th>第九次</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 文逸霖的数据行 -->
                        <tr>
                            <td class="name-cell-wen">文逸霖</td>
                            <td><input type="number" id="wen_1" class="cell-input" min="0" step="1" value="182"></td>
                            <td><input type="number" id="wen_2" class="cell-input" min="0" step="1" value="187"></td>
                            <td><input type="number" id="wen_3" class="cell-input" min="0" step="1" value="195"></td>
                            <td><input type="number" id="wen_4" class="cell-input" min="0" step="1" value="203"></td>
                            <td><input type="number" id="wen_5" class="cell-input" min="0" step="1" value="208"></td>
                            <td><input type="number" id="wen_6" class="cell-input" min="0" step="1" value="212"></td>
                            <td><input type="number" id="wen_7" class="cell-input" min="0" step="1"></td>
                            <td><input type="number" id="wen_8" class="cell-input" min="0" step="1"></td>
                            <td><input type="number" id="wen_9" class="cell-input" min="0" step="1"></td>
                        </tr>
                        <!-- 历庭硕的数据行 -->
                        <tr>
                            <td class="name-cell-li">历庭硕</td>
                            <td><input type="text" class="cell-input disabled-input" value="无" disabled></td>
                            <td><input type="text" class="cell-input disabled-input" value="无" disabled></td>
                            <td><input type="text" class="cell-input disabled-input" value="无" disabled></td>
                            <td><input type="number" id="other_4" class="cell-input" min="0" step="1"></td>
                            <td><input type="number" id="other_5" class="cell-input" min="0" step="1"></td>
                            <td><input type="number" id="other_6" class="cell-input" min="0" step="1"></td>
                            <td><input type="number" id="other_7" class="cell-input" min="0" step="1"></td>
                            <td><input type="number" id="other_8" class="cell-input" min="0" step="1"></td>
                            <td><input type="number" id="other_9" class="cell-input" min="0" step="1"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="action-container">
                <button id="generateBtn">生成复式折线图</button>
            </div>
        </section>
        
        <!-- 核心折线图展示区 -->
        <section class="chart-container" id="lineChartContainer">
            <h2 class="chart-title">跳绳数量对比统计图 (折线图)</h2>
            <div class="canvas-wrapper">
                <canvas id="lineChart"></canvas>
            </div>
        </section>
        
        <footer>
            <p>一分钟跳绳个数情况统计 &copy; 2023</p>
        </footer>
    </div>

    <script>
        // 注册 Chart.js DataLabels 插件
        Chart.register(ChartDataLabels);

        // 基础常量配置
        const LABELS = ['第一次', '第二次', '第三次', '第四次', '第五次', '第六次', '第七次', '第八次', '第九次'];
        const COLOR_WEN = '#ffd166'; // 文逸霖的颜色 (黄)
        const COLOR_OTHER = '#4da6ff'; // 历庭硕的颜色 (蓝)

        // 基础图表配置对象
        const chartConfig = {
            type: 'line',
            data: {
                labels: LABELS,
                datasets: []
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: { top: 30, bottom: 20 } 
                },
                plugins: {
                    legend: { 
                        display: true, 
                        labels: { color: '#e6f2ff', font: { size: 14 } } 
                    },
                    tooltip: { 
                        backgroundColor: 'rgba(10, 20, 40, 0.9)',
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.parsed.y + ' 个';
                            }
                        }
                    }
                },
                scales: {
                    x: { 
                        title: { display: true, text: '记录次数', color: '#cce5ff', font: { size: 15 } }, 
                        ticks: { color: '#e6f2ff' }, 
                        grid: { color: 'rgba(255,255,255,0.08)' } 
                    },
                    y: { 
                        min: 150, // 纵轴固定从 150 开始
                        title: { display: true, text: '个数 (个)', color: '#cce5ff', font: { size: 15 } }, 
                        ticks: { color: '#e6f2ff', stepSize: 5 }, 
                        grid: { color: 'rgba(255,255,255,0.08)' } 
                    }
                }
            }
        };

        // 初始化图表实例
        const ctx = document.getElementById('lineChart').getContext('2d');
        let myChart = new Chart(ctx, chartConfig);

        // 核心绘图及更新方法
        function renderChart() {
            let wenData = [];
            let otherData = [];
            let hasOtherData = false;

            // 循环获取 1 到 9 次的输入框数据
            for (let i = 1; i <= 9; i++) {
                // 1. 文逸霖数据
                let wVal = document.getElementById(`wen_${i}`).value;
                wenData.push(wVal !== '' ? parseInt(wVal) : null);

                // 2. 历庭硕数据 (前三次固定为无数据，强制记为 null)
                if (i >= 1 && i <= 3) {
                    otherData.push(null);
                } else {
                    let oVal = document.getElementById(`other_${i}`).value;
                    if (oVal !== '') {
                        otherData.push(parseInt(oVal));
                        hasOtherData = true;
                    } else {
                        otherData.push(null);
                    }
                }
            }

            // 组装最终的数据集
            let newDatasets = [
                {
                    label: '文逸霖',
                    data: wenData,
                    borderColor: COLOR_WEN,
                    backgroundColor: `${COLOR_WEN}20`,
                    borderWidth: 3,
                    pointBackgroundColor: COLOR_WEN,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 6,
                    pointHoverRadius: 8,
                    tension: 0.3, 
                    fill: false,
                    spanGaps: true, // 允许跨越空数据点连线
                    datalabels: {
                        color: COLOR_WEN,
                        align: 'top',      
                        anchor: 'bottom',
                        offset: 8,
                        font: { weight: 'bold', size: 14 },
                        formatter: function(value) { return value ? value : ''; }
                    }
                }
            ];

            // 如果历庭硕有填写任意数据，将他的线加入图表
            if (hasOtherData) {
                newDatasets.push({
                    label: '历庭硕',
                    data: otherData,
                    borderColor: COLOR_OTHER,
                    backgroundColor: `${COLOR_OTHER}20`,
                    borderWidth: 3,
                    pointBackgroundColor: COLOR_OTHER,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 6,
                    pointHoverRadius: 8,
                    tension: 0.3,
                    fill: false,
                    spanGaps: true,
                    datalabels: {
                        color: COLOR_OTHER,
                        align: 'bottom',    // 标签位于下方防重叠
                        anchor: 'top',
                        offset: 8,
                        font: { weight: 'bold', size: 14 },
                        formatter: function(value) { return value ? value : ''; }
                    }
                });
            }

            // 更新并渲染
            myChart.data.datasets = newDatasets;
            myChart.update();
        }

        // 页面加载完毕后立刻调用一次，渲染默认内置的数据
        renderChart();

        // 绑定按钮点击事件
        document.getElementById('generateBtn').addEventListener('click', renderChart);
    </script>
</body>
</html>
